name: Release Template

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create template ZIP
        run: |
          zip lazyvim-coder-template-${{ steps.version.outputs.version }}.zip \
            main.tf \
            README.md \
            .mise.toml

      - name: Generate checksums
        run: sha256sum lazyvim-coder-template-${{ steps.version.outputs.version }}.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LazyVim Coder Template ${{ steps.version.outputs.version }}
          body: |
            ## LazyVim + mise + Claude Code Coder Template v${{ steps.version.outputs.version }}

            ### Features
            - LazyVim with Go and TypeScript extras
            - mise version manager for Node.js and Go
            - Claude Code v5.2.0 integration
            - GitHub CLI
            - Terraform debugging skill
            - GLM configuration support

            ### Installation in Coder
            1. In Coder UI, go to Templates → Add Template
            2. Select "From URL"
            3. Enter: https://github.com/marekbrze/lazyvim-coder-template/releases/download/v${{ steps.version.outputs.version }}/lazyvim-coder-template-${{ steps.version.outputs.version }}.zip
            4. Click Create

            ### Files
            - main.tf - Terraform configuration
            - README.md - Documentation
            - .mise.toml - mise configuration

            ### Checksums
            \`\`\`
            $(cat checksums.txt)
            \`\`\`
          files: |
            lazyvim-coder-template-${{ steps.version.outputs.version }}.zip
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
